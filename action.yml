name: "UniDeploy AI DevOps Agent"
description: "AI DevOps agent for CI/CD — diagnose failures, audit AWS/Azure/GCP, post fixes as PR comments."
author: "UniDeploy"

branding:
  icon: "zap"
  color: "purple"

inputs:
  prompt:
    description: "The natural-language task for the agent (e.g. 'Find the CI failure root cause and suggest a fix')."
    required: false
  playbook:
    description: "Name of a saved playbook to run instead of a raw prompt (e.g. 'security-audit', 'cost-report')."
    required: false
  playbook-vars:
    description: "Space-separated key=value variable overrides for the playbook (e.g. 'region=us-east-1 hours=24')."
    required: false
    default: ""
  api-key:
    description: "UniDeploy API key (store in GitHub secrets as UNIDEPLOY_API_KEY). Get one at https://unideploy.com."
    required: true
  provider:
    description: "Model provider: amazon-bedrock | anthropic | openai | gemini."
    required: false
    default: "amazon-bedrock"
  region:
    description: "AWS region for Bedrock / AWS operations."
    required: false
    default: "us-east-1"
  model:
    description: "Optional model override (e.g. 'amazon-bedrock/amazon.nova-pro-v1:0')."
    required: false
    default: ""
  max-steps:
    description: "Maximum agent steps before stopping."
    required: false
    default: "25"
  comment-on-pr:
    description: "If 'true' and run on a pull_request, post the agent output as a PR comment."
    required: false
    default: "false"
  github-token:
    description: "GitHub token used to post PR comments (defaults to github.token)."
    required: false
    default: ${{ github.token }}

outputs:
  result:
    description: "The agent's final response text."
    value: ${{ steps.run-agent.outputs.result }}

runs:
  using: "composite"
  steps:
    - name: Install UniDeploy
      shell: bash
      run: |
        echo "::group::Installing UniDeploy"
        curl -sSL https://dl2.unideploy.com/install.sh | sh
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        echo "::endgroup::"

    - name: Configure UniDeploy
      shell: bash
      env:
        UNIDEPLOY_API_KEY: ${{ inputs.api-key }}
      run: |
        echo "::group::Configuring UniDeploy"
        export PATH="$HOME/.local/bin:$PATH"
        unideploy auth login --api-key "$UNIDEPLOY_API_KEY"
        unideploy auth login --provider "${{ inputs.provider }}" --region "${{ inputs.region }}"

        # Ensure a valid model is set in config so BOTH the prompt path and the
        # playbook path work (a bare bedrock login has no valid default model).
        MODEL_TO_SET="${{ inputs.model }}"
        if [ -z "$MODEL_TO_SET" ] && [ "${{ inputs.provider }}" = "amazon-bedrock" ]; then
          MODEL_TO_SET="amazon-bedrock/amazon.nova-pro-v1:0"
        fi
        if [ -n "$MODEL_TO_SET" ]; then
          CFG="$HOME/.Unideploy/config.toml"
          if grep -q '^model = ' "$CFG"; then
            sed -i "s|^model = .*|model = \"$MODEL_TO_SET\"|" "$CFG"
          else
            sed -i "/^\[profiles.default\]/a model = \"$MODEL_TO_SET\"" "$CFG"
          fi
          echo "Model set to: $MODEL_TO_SET"
        fi

        unideploy version
        echo "::endgroup::"

    - name: Run agent
      id: run-agent
      shell: bash
      run: |
        export PATH="$HOME/.local/bin:$PATH"

        MODEL_ARG=""
        if [ -n "${{ inputs.model }}" ]; then
          MODEL_ARG="--model ${{ inputs.model }}"
        elif [ "${{ inputs.provider }}" = "amazon-bedrock" ]; then
          # Default to a widely-available Bedrock model so fresh CI runs work
          # out of the box (a bare bedrock login has no valid default model).
          MODEL_ARG="--model amazon-bedrock/amazon.nova-pro-v1:0"
        fi

        OUTPUT_FILE="$(mktemp)"

        if [ -n "${{ inputs.playbook }}" ]; then
          echo "::group::Running playbook: ${{ inputs.playbook }}"
          VAR_ARGS=""
          for kv in ${{ inputs.playbook-vars }}; do
            VAR_ARGS="$VAR_ARGS --var $kv"
          done
          # shellcheck disable=SC2086
          unideploy playbook run "${{ inputs.playbook }}" $VAR_ARGS 2>&1 | tee "$OUTPUT_FILE"
          echo "::endgroup::"
        else
          if [ -z "${{ inputs.prompt }}" ]; then
            echo "::error::Either 'prompt' or 'playbook' input is required."
            exit 1
          fi
          echo "::group::Running prompt"
          # shellcheck disable=SC2086
          unideploy --async $MODEL_ARG --max-steps "${{ inputs.max-steps }}" "${{ inputs.prompt }}" 2>&1 | tee "$OUTPUT_FILE"
          echo "::endgroup::"
        fi

        # Capture the result for the output (multiline-safe).
        {
          echo "result<<UNIDEPLOY_EOF"
          cat "$OUTPUT_FILE"
          echo "UNIDEPLOY_EOF"
        } >> "$GITHUB_OUTPUT"

        cp "$OUTPUT_FILE" unideploy-output.txt

    - name: Comment on PR
      if: ${{ inputs.comment-on-pr == 'true' && github.event_name == 'pull_request' }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        export PATH="$HOME/.local/bin:$PATH"
        if ! command -v gh >/dev/null 2>&1; then
          echo "gh CLI not available; skipping PR comment."
          exit 0
        fi
        BODY="$(mktemp)"
        {
          echo "## 🤖 UniDeploy Agent"
          echo ""
          echo '```'
          # Strip ANSI colour codes for clean PR comments.
          sed -r 's/\x1b\[[0-9;]*m//g' unideploy-output.txt | tail -c 60000
          echo '```'
          echo ""
          echo "_Generated by [UniDeploy](https://unideploy.com)_"
        } > "$BODY"
        gh pr comment "${{ github.event.pull_request.number }}" --body-file "$BODY" || \
          echo "Failed to post PR comment (check token permissions: needs pull-requests: write)."
